<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTEGRATED SUBSTATION DASHBOARD</title>
    <style>
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            background-color: #f4f6f7;
            margin: 0;
            padding: 10px;
            color: #2c3e50;
        }
        
        .container {
            max-width: 1200px;
            margin: 10px auto;
            background-color: white;
            background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ2eRaGlO1EorZGGHhpbwnxxVZhgP-_oXnKVt46GWqSfw&s=10');
            background-repeat: no-repeat;
            background-position: center 400px;
            background-size: 280px;
            background-attachment: local;
            position: relative;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 8px;
            z-index: 1;
        }
        
        .container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 8px;
            z-index: -1;
        }
        
        .header-panel {
            background: linear-gradient(135deg, #111111 0%, #2c3e50 100%);
            color: #ffffff;
            padding: 22px;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .header-panel h2 {
            margin: 0;
            padding: 0;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #ffffff;
            line-height: 1.4;
        }

        .header-panel .sub-tag {
            font-size: 11px;
            color: #f1c40f;
            font-weight: bold;
            letter-spacing: 2px;
            margin-top: 6px;
            text-transform: uppercase;
        }
        
        .status {
            font-size: 11px;
            color: #27ae60;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-bottom: 25px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid #e2e8f0;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 10px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            white-space: nowrap;
        }
        
        th, td {
            border: 1px solid #bdc3c7;
            padding: 8px 6px;
            text-align: center;
            vertical-align: middle;
        }
        
        th {
            background-color: #2c3e50 !important;
            color: white !important;
            font-weight: bold !important;
            font-size: 12px;
            letter-spacing: 0.5px;
        }
        
        .row-office-merged {
            font-weight: bold !important;
            background: linear-gradient(90deg, #1f4e78 0%, #2c3e50 100%) !important;
            color: #ffffff !important;
            text-align: left !important;
            font-size: 12px !important;
            text-transform: uppercase;
            padding: 8px 15px !important;
        }

        .section-separator-title {
            background-color: #111111;
            color: #ffffff;
            font-weight: bold;
            padding: 10px;
            font-size: 14px;
            border-radius: 4px;
            margin-top: 30px;
            margin-bottom: 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: center;
        }

        .row-grand-total td {
            font-weight: bold !important;
            border-top: 2px double #2c3e50 !important;
            border-bottom: 2px solid #2c3e50 !important;
            background-color: #eaeded !important;
            color: #111111 !important;
        }
        
        /* Dynamic Smart Text Colors */
        .text-red { color: #e74c3c !important; font-weight: bold !important; }
        .text-yellow { color: #d4ac0d !important; font-weight: bold !important; }
        .text-green { color: #27ae60 !important; font-weight: bold !important; }

        .index-bold-black-cell {
            color: #000000 !important;
            font-weight: bold !important;
        }

        /* Personalized Developer Signature Layout */
        .signature-footer {
            margin-top: 35px;
            text-align: center;
            font-size: 11px;
            color: #7f8c8d;
            font-weight: 500;
            letter-spacing: 0.8px;
            border-top: 1px dashed #d5dbdb;
            padding-top: 15px;
        }
        
        .signature-footer span {
            color: #2980b9;
            font-weight: bold;
            text-shadow: 0.5px 0.5px 1px rgba(0,0,0,0.05);
        }

        @media (min-width: 992px) {
            body { padding: 20px; }
            .container { padding: 30px; margin: 20px auto; background-size: 350px; }
            .header-panel h2 { font-size: 24px; }
            .header-panel .sub-tag { font-size: 13px; }
            .status { font-size: 13px; text-align: right; }
            .dashboard-grid {
                grid-template-columns: 1fr 1fr;
            }
            table { font-size: 13px; }
            th { font-size: 14px; }
            th, td { padding: 10px 8px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-panel">
        <h2>EXECUTIVE ENGINEER EDD HAIDERGARH</h2>
        <div class="sub-tag">Target & Achievement Real-Time Monitoring Panel</div>
    </div>

    <div id="update-status" class="status">● Connecting to Google Sheet Master Control...</div>
    
    <div class="table-responsive" id="main-top-table-container">
        <p style="text-align:center; padding:20px; font-weight:bold;">Loading Top Master Matrix...</p>
    </div>
    
    <div class="section-separator-title">📊 INDEX SHEET PERFORMANCE MATRIX</div>

    <div class="dashboard-grid">
        <div class="table-responsive">
            <div id="index-left-container"></div>
        </div>
        <div class="table-responsive">
            <div id="index-right-container"></div>
        </div>
    </div>

    <div class="signature-footer">
        Dashboard Powered by: <span>DEEPAK AWASTHI</span>
    </div>
</div>

<script>
    let primaryData = null;
    let indexData = null;

    function checkIfHeaderRow(text) {
        let clean = text.toUpperCase().replace(/[▪\s]/g, '');
        return clean.includes("10+KW") || clean.includes("HV1&2") || clean.includes("HV-1&2") || 
               clean.includes("LMV-2") || clean.includes("4B&6") || clean.includes("LOAD1-4KW") || clean.includes("5-9KW");
    }

    function checkIfGrandTotalRow(rowObj) {
        if (!rowObj || !rowObj.c) return false;
        for (let i = 0; i < rowObj.c.length; i++) {
            let cell = rowObj.c[i];
            if (cell) {
                let cellText = (cell.f ? cell.f : (cell.v ? cell.v : '')).toString().toUpperCase().trim();
                if (cellText.includes("GRAND TOTAL") || cellText === "TOTAL" || cellText.includes("EDSD") || cellText.includes("EDD")) {
                    return true;
                }
            }
        }
        return false;
    }

    function shouldSkipRowComplete(rowObj) {
        if (!rowObj || !rowObj.c) return false;
        const dateRegex = /\d{1,4}[-/.\s]([A-Za-z]{3}|\d{1,2})[-/.\s]\d{2,4}/;
        for (let i = 0; i < rowObj.c.length; i++) {
            let cell = rowObj.c[i];
            if (cell) {
                let cellText = (cell.f ? cell.f : (cell.v ? cell.v : '')).toString().toUpperCase().trim();
                if (cellText === "SUBSTATION" || cellText === "SUBSTATION2" || cellText.includes("SUBSTATION") || cellText.includes("24-06-2026") || (dateRegex.test(cellText) && !cellText.includes("EDSD") && !cellText.includes("EDD"))) {
                    return true;
                }
            }
        }
        return false;
    }

    function parseAndRenderCellTop(cell, cellIndex, isGrandTotal) {
        let val = cell ? (cell.f ? cell.f : (cell.v ? cell.v : '')) : '';
        let cellStyle = "";
        if (isGrandTotal) return `<td><b>${val}</b></td>`;

        let numValue = parseFloat(val.toString().replace(/[^0-9.]/g, ''));
        if (!isNaN(numValue)) {
            if (cellIndex === 3) { 
                if (numValue >= 0 && numValue <= 30) cellStyle = "class='text-green'";
                else if (numValue > 30 && numValue <= 50) cellStyle = "class='text-yellow'";
                else if (numValue > 50) cellStyle = "class='text-red'";
            } else if (cellIndex === 4) { 
                if (numValue >= 0 && numValue <= 30) cellStyle = "class='text-red'";
                else if (numValue > 30 && numValue <= 50) cellStyle = "class='text-yellow'";
                else if (numValue > 50) cellStyle = "class='text-green'";
            }
        }
        return `<td ${cellStyle}>${val}</td>`;
    }

    function parseAndRenderCellIndex(cell, cellIndex, isGrandTotal) {
        let val = cell ? (cell.f ? cell.f : (cell.v ? cell.v : '')) : '';
        if (isGrandTotal) return `<td><b>${val}</b></td>`;
        let cellStyle = "class='index-bold-black-cell'";
        return `<td ${cellStyle}>${val}</td>`;
    }

    function buildRowString(row, isTopSection) {
        let isGrandTotal = checkIfGrandTotalRow(row);
        let firstCellVal = (row.c && row.c[0]) ? (row.c[0].f ? row.c[0].f : (row.c[0].v ? row.c[0].v : '')).toString() : '';
        
        if (checkIfHeaderRow(firstCellVal)) {
            return `<tr><td colspan="5" class="row-office-merged">▪ ${firstCellVal}</td></tr>`;
        } else {
            let rowHtml = isGrandTotal ? "<tr class='row-grand-total'>" : "<tr>";
            for(let idx = 0; idx < 5; idx++) {
                if (isTopSection) {
                    rowHtml += parseAndRenderCellTop(row.c ? row.c[idx] : null, idx, isGrandTotal);
                } else {
                    rowHtml += parseAndRenderCellIndex(row.c ? row.c[idx] : null, idx, isGrandTotal);
                }
            }
            rowHtml += "</tr>";
            return rowHtml;
        }
    }

    function buildCombinedTable() {
        if (!primaryData || !indexData) return;

        try {
            let topHeaders = primaryData.table.cols.length >= 5 ? primaryData.table.cols.slice(0, 5) : [{label:'Particulars'},{label:'Target'},{label:'Achievement'},{label:'Difference'},{label:'% Age'}];
            
            let topHtmlTable = "<table><tr>";
            topHeaders.forEach(h => topHtmlTable += `<th>${h.label || 'Column'}</th>`);
            topHtmlTable += "</tr>";

            primaryData.table.rows.forEach(row => {
                if (!row.c || row.c.length === 0 || shouldSkipRowComplete(row)) return;
                topHtmlTable += buildRowString(row, true);
            });
            topHtmlTable += "</table>";
            document.getElementById("main-top-table-container").innerHTML = topHtmlTable;

            // 2. NICHE VALA DATA SEGMENTATION
            let validIndexRows = [];
            indexData.table.rows.forEach((row, idx) => {
                if (idx === 0 || !row.c || row.c.length === 0 || shouldSkipRowComplete(row)) return;
                validIndexRows.push(row);
            });

            let halfLength = Math.ceil(validIndexRows.length / 2);
            let customHeaderStr = "<tr><th>Particulars</th><th>Target</th><th>Achievement</th><th>GAP</th><th>PAYABLE AMOUNT</th></tr>";
            
            let leftHeaderStr = "<table>" + customHeaderStr;
            let rightHeaderStr = "<table>" + customHeaderStr;

            for(let i = 0; i < validIndexRows.length; i++) {
                if(i < halfLength) {
                    leftHeaderStr += buildRowString(validIndexRows[i], false);
                } else {
                    rightHeaderStr += buildRowString(validIndexRows[i], false);
                }
            }
            
            leftHeaderStr += "</table>";
            rightHeaderStr += "</table>";

            document.getElementById("index-left-container").innerHTML = leftHeaderStr;
            document.getElementById("index-right-container").innerHTML = rightHeaderStr;

            const now = new Date();
            document.getElementById("update-status").innerHTML = `● Live Connected | Panels Operational Sync: ${now.toLocaleTimeString()}`;
            document.getElementById("update-status").style.color = "#27ae60";
        } catch (error) {
            console.error(error);
            document.getElementById("update-status").innerHTML = "Data Fusion Framework Process Error";
            document.getElementById("update-status").style.color = "#c0392b";
        }
    }

    function primarySheetCallback(json) { primaryData = json; buildCombinedTable(); }
    function indexSheetCallback(json) { indexData = json; buildCombinedTable(); }

    function refreshLiveData() {
        const oldScript1 = document.getElementById('live-script-primary');
        const oldScript2 = document.getElementById('live-script-index');
        if (oldScript1) oldScript1.remove();
        if (oldScript2) oldScript2.remove();

        const spreadsheetId = "1KY_T7IeafmIJESdHo52RCT1Q5bgcbWBG";
        const ts = new Date().getTime();

        const urlPrimary = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=responseHandler:primarySheetCallback&gid=156577105&range=A1:E35&ts=${ts}`;
        const script1 = document.createElement('script');
        script1.id = 'live-script-primary';
        script1.src = urlPrimary;
        document.body.appendChild(script1);

        const urlIndex = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=responseHandler:indexSheetCallback&sheet=INDEX&range=A1:E60&ts=${ts}`;
        const script2 = document.createElement('script');
        script2.id = 'live-script-index';
        script2.src = urlIndex;
        document.body.appendChild(script2);
    }

    refreshLiveData();
    setInterval(refreshLiveData, 5000);
</script>

</body>
</html>
